services:
  postgres:
    image: postgres:16-alpine
    container_name: tecora-postgres
    environment:
      POSTGRES_DB: tecorabe
      POSTGRES_USER: tecorabe
      POSTGRES_PASSWORD: tecorabe
    ports:
      - "5432:5432"
    volumes:
      - tecora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecorabe -d tecorabe"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tecora-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://tecorabe:tecorabe@postgres:5432/tecorabe?sslmode=disable
      CLERK_ISSUER_URL: ""
      CLERK_JWKS_URL: ""
      CLERK_AUDIENCE: ""
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8081,http://127.0.0.1:3000,http://127.0.0.1:8081
    ports:
      - "8080:8080"

volumes:
  tecora_postgres_data:
